<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <title>Contact Page | devChallenges.io</title>
  </head>
  <body>
    <img src="resources/Logo.svg" alt="logotype" id="logo" />
    <main>
      <div class="head">
        <h1 class="heading">Interested in our business pricing?</h1>
        <h2 class="heading">
          Fill out the form to view details and we’ll contact you as soon as
          possible.
        </h2>
      </div>

      <div class="contact">
        <div class="contact-grid">
          <div class="input-field">
            <label for="name">Name</label>
            <input
              class="in-se-but"
              type="text"
              id="name"
              placeholder="Ethan Johnson"
            />
          </div>

          <div class="input-field">
            <label for="email">Company Email</label>
            <input
              class="in-se-but"
              type="email"
              id="email"
              placeholder="ethan@johnson.com"
            />
          </div>

          <div class="input-field">
            <label for="size">Company Size</label>
            <select class="in-se-but" name="text" id="size">
              <option value="50-100" class="option" selected>
                50-100 employees
              </option>
              <option value="101-200">101-200 employees</option>
            </select>
          </div>

          <div class="input-field">
            <label for="subject">Subject</label>
            <select class="in-se-but" name="text" id="subject">
              <option value="landing" class="option" selected>
                Building Landing pages
              </option>
              <option value="design">Designing Websites</option>
            </select>
          </div>
          <div id="message">
            <div class="input-field">
              <label for="message">Message</label>

              <textarea class="last-input">50-100 employees</textarea>
            </div>
          </div>

          <button class="in-se-but" type="submit" id="button">
            Contact Sales
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
